services:
  # ----------------------------------------------------------------------------
  # 1. Redis Caching Service
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - portfolio_network

  # ----------------------------------------------------------------------------
  # 2. Express Backend Server
  # ----------------------------------------------------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: portfolio_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:5000/api/health\", (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - portfolio_network

  # ----------------------------------------------------------------------------
  # 3. React Client (Nginx Frontend Static Serve & Reverse Proxy)
  # ----------------------------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: portfolio_client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_started
    networks:
      - portfolio_network

# ------------------------------------------------------------------------------
# Persistent Volume Declarations
# ------------------------------------------------------------------------------
volumes:
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ------------------------------------------------------------------------------
# Networks Definition
# ------------------------------------------------------------------------------
networks:
  portfolio_network:
    driver: bridge